<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌤️</text></svg>">
    <title>{% block title %}Dashboard{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap"
          rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    {% block head %}{% endblock %}
</head>
<body>

{% block content %}{% endblock %}

<!-- ── BOTTOM TAB BAR ── -->
<nav class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('weather', this)">
        <svg viewBox="0 0 24 24"><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/><circle cx="12" cy="12" r="4"/></svg>
        <span>Weather</span>
    </button>
    <button class="tab-btn" onclick="switchTab('aircraft', this)">
        <svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
        <span>Aircraft</span>
    </button>
    <button class="tab-btn" onclick="switchTab('radio', this)">
        <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7 7 2"/><circle cx="12" cy="14" r="3"/><path d="M16 14h1M7 14h1"/></svg>
        <span>Radio</span>
    </button>
    <button class="tab-btn" onclick="switchTab('atc', this)">
        <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>
        <span>ATC</span>
    </button>
    <button class="tab-btn" onclick="switchTab('map', this)">
        <svg viewBox="0 0 24 24"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
        <span>Map</span>
    </button>
</nav>

<script src="{{ url_for('static', filename='js/atc_data.js') }}"></script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
{% block scripts %}{% endblock %}

</body>
</html>
